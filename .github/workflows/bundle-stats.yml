name: Bundle Stats

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  actions: read

env:
  # Force nested JS actions onto Node 24 (silences the Node 20 deprecation warning).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/bundle-size@bundle-size/v1.1.0
