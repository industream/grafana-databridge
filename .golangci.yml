# golangci-lint v2 config — keep the lint step from traversing into
# `node_modules`. Some npm packages (notably `flatted`) ship Go source
# files for their own internal build pipeline, and `go list ./...`
# happily picks them up. Those files fail govet, breaking release CI
# even though they have nothing to do with our plugin code.
#
# See https://golangci-lint.run/usage/configuration/ for the full schema.
version: "2"

linters:
  exclusions:
    paths:
      - node_modules
      - dist
      - \.config
